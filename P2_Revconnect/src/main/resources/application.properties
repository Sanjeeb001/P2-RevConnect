# ================================================
# RevConnect P2 - Application Configuration
# ================================================

# Server
server.port=8082
server.servlet.context-path=/

# ================================================
# Oracle Database
# ================================================
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/ORCLPDB
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=r2sample
spring.datasource.password=r2sample

# H2 Console (Disabled for Oracle)
spring.h2.console.enabled=false


logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
# ================================================
# JPA / Hibernate
# ================================================
spring.jpa.database-platform=com.rev.app.config.OracleLegacyDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ================================================
# Thymeleaf
# ================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ================================================
# Spring Security
# ================================================
spring.security.user.name=admin
spring.security.user.password=admin

# ================================================
# File Upload
# ================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Profile picture upload directory
app.upload.dir=./uploads

# ================================================
# Logging (Log4J2)
# ================================================
logging.config=classpath:log4j2.xml
